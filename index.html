<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The System · Awakening Arise</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="glass-panel" id="app">
  <button class="back-btn" id="backBtn">
    <span class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 12H5" />
        <path d="M12 19l-7-7 7-7" />
      </svg>
    </span>
    Back
  </button>

  <div id="mainMenu">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1>The System</h1>
    </div>
    <div class="subtitle">Awakening Arise</div>
    <h2>✦ Choose Your Path ✦</h2>
    <div class="button-group">
      <button class="glass-btn btn-hunter" id="hunterBtn" aria-label="Hunter">
        <span>
          <span class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
          </span>
          <span class="label">Hunter</span>
        </span>
      </button>

      <button class="glass-btn btn-ruler" id="rulerBtn" aria-label="Ruler">
        <span>
          <span class="icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M3 3v18h18" />
              <path d="M18 7v2" />
              <path d="M14 7v6" />
              <path d="M10 7v10" />
              <path d="M6 7v14" />
            </svg>
          </span>
          <span class="label">Ruler</span>
        </span>
      </button>
    </div>
    <div class="credit">The System Choose You</div>
  </div>

  <div class="auth-form" id="authForm">
    <h3 id="formTitle">Create Account</h3>
    <div class="subtitle" id="formSubtitle">Join as <span id="roleDisplay">Hunter</span></div>
    
    <input type="text" id="nameInput" placeholder="Username" />
    <input type="email" id="emailInput" placeholder="Email address" />
    <input type="password" id="passwordInput" placeholder="Password (min 6 characters)" />
    <div class="error-msg" id="errorMsg"></div>
    
    <div class="auth-actions">
      <button class="auth-btn" id="submitAuthBtn">
        <span class="icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </span>
        <span id="submitLabel">Sign Up</span>
      </button>
      
      <div class="toggle-wrapper">
        <span class="toggle-text" id="togglePrefix">Already have an account?</span>
        <button class="toggle-highlight" id="toggleHighlightBtn">Sign In</button>
      </div>
    </div>
  </div>
</div>

<script>
  const mainMenu = document.getElementById('mainMenu');
  const authForm = document.getElementById('authForm');
  const backBtn = document.getElementById('backBtn');
  const hunterBtn = document.getElementById('hunterBtn');
  const rulerBtn = document.getElementById('rulerBtn');
  const formTitle = document.getElementById('formTitle');
  const formSubtitle = document.getElementById('formSubtitle');
  const roleDisplay = document.getElementById('roleDisplay');
  const submitLabel = document.getElementById('submitLabel');
  const toggleHighlightBtn = document.getElementById('toggleHighlightBtn');
  const togglePrefix = document.getElementById('togglePrefix');
  const submitAuthBtn = document.getElementById('submitAuthBtn');
  const nameInput = document.getElementById('nameInput');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const errorMsg = document.getElementById('errorMsg');

  let currentRole = 'Hunter';
  let isSignIn = false;

  auth.onAuthStateChanged((user) => {
    if (user) {
      window.location.href = 'dashboard.html';
    }
  });

  function showAuthForm(role) {
    currentRole = role;
    roleDisplay.textContent = role;
    mainMenu.style.display = 'none';
    authForm.classList.add('active');
    backBtn.classList.add('visible');
    errorMsg.classList.remove('show');
    isSignIn = false;
    updateFormMode();
  }

  function hideAuthForm() {
    mainMenu.style.display = 'block';
    authForm.classList.remove('active');
    backBtn.classList.remove('visible');
    nameInput.value = '';
    emailInput.value = '';
    passwordInput.value = '';
    errorMsg.classList.remove('show');
    isSignIn = false;
    updateFormMode();
  }

  function updateFormMode() {
    const toggleWrapper = document.querySelector('.toggle-wrapper');

    // Rulers never self-signup — admin accounts are only ever created
    // manually, so this path is sign-in only, no toggle to switch modes.
    if (currentRole === 'Ruler') {
      isSignIn = true;
      formTitle.textContent = 'Ruler Sign In';
      formSubtitle.textContent = 'Sign in as Ruler';
      submitLabel.textContent = 'Sign In';
      nameInput.style.display = 'none';
      if (toggleWrapper) toggleWrapper.style.display = 'none';
      return;
    }

    if (toggleWrapper) toggleWrapper.style.display = '';
    if (isSignIn) {
      formTitle.textContent = 'Welcome Back';
      formSubtitle.textContent = `Sign in as ${currentRole}`;
      submitLabel.textContent = 'Sign In';
      togglePrefix.textContent = "Don't have an account?";
      toggleHighlightBtn.textContent = 'Sign Up';
      nameInput.style.display = 'none';
    } else {
      formTitle.textContent = 'Create Account';
      formSubtitle.textContent = `Join as ${currentRole}`;
      submitLabel.textContent = 'Sign Up';
      togglePrefix.textContent = 'Already have an account?';
      toggleHighlightBtn.textContent = 'Sign In';
      nameInput.style.display = 'block';
    }
  }

  function showError(message) {
    errorMsg.textContent = message;
    errorMsg.classList.add('show');
  }

  function handleAuthSubmit() {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();
    
    if (!email || !password) {
      showError('Please fill in all required fields.');
      return;
    }

    if (password.length < 6) {
      showError('Password must be at least 6 characters.');
      return;
    }

    errorMsg.classList.remove('show');
    submitAuthBtn.disabled = true;
    submitAuthBtn.textContent = 'Loading...';

    if (currentRole === 'Ruler') {
      // Rulers only ever sign in — admin accounts are created manually
      // (e.g. via the Firebase console), never through self-signup here.
      auth.signInWithEmailAndPassword(email, password)
        .then((cred) => db.collection('users').doc(cred.user.uid).get())
        .then((doc) => {
          const data = doc.data();
          if (!data || data.role !== 'admin') {
            return auth.signOut().then(() => {
              throw new Error('This account does not have Ruler access.');
            });
          }
          window.location.href = 'dashboard.html';
        })
        .catch((error) => {
          submitAuthBtn.disabled = false;
          submitAuthBtn.textContent = 'Sign In';
          showError(error.message);
        });
      return;
    }

    if (!isSignIn) {
      const username = nameInput.value.trim();
      if (!username) {
        showError('Please enter a username.');
        submitAuthBtn.disabled = false;
        submitAuthBtn.textContent = 'Sign Up';
        return;
      }

      // Create (and authenticate) the account first, since Firestore rules
      // require auth for reads — only after auth do we check for a colliding
      // username, then append a random 4-digit suffix so usernames never collide.
      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const uid = userCredential.user.uid;
          return db.collection('users').where('username', '==', username).get().then((existingSnap) => {
            const finalUsername = existingSnap.empty ? username : username + Math.floor(1000 + Math.random() * 9000);
            const newUser = {
              uid: uid, email: email, username: finalUsername,
              role: 'hunter', rank: 'E', xp: 0, gold: 100, hp: 100, maxHP: 100,
              inventory: [], itemStats: {}, itemCounts: {},
              dungeonRaidCount: 0, dungeonLastReset: new Date().toDateString(), dungeonNextRaidTime: null
            };
            return db.collection('users').doc(uid).set(newUser);
          });
        })
        .then(() => {
          submitAuthBtn.disabled = false;
          submitAuthBtn.textContent = 'Sign Up';
          window.location.href = 'dashboard.html';
        })
        .catch((error) => {
          submitAuthBtn.disabled = false;
          submitAuthBtn.textContent = 'Sign Up';
          showError(error.message);
        });
    } else {
      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          submitAuthBtn.disabled = false;
          submitAuthBtn.textContent = 'Sign In';
          window.location.href = 'dashboard.html';
        })
        .catch((error) => {
          submitAuthBtn.disabled = false;
          submitAuthBtn.textContent = 'Sign In';
          showError(error.message);
        });
    }
  }

  hunterBtn.addEventListener('click', (e) => {
    e.preventDefault();
    showAuthForm('Hunter');
  });

  rulerBtn.addEventListener('click', (e) => {
    e.preventDefault();
    showAuthForm('Ruler');
  });

  backBtn.addEventListener('click', hideAuthForm);

  toggleHighlightBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentRole === 'Ruler') return;
    isSignIn = !isSignIn;
    errorMsg.classList.remove('show');
    updateFormMode();
  });

  submitAuthBtn.addEventListener('click', handleAuthSubmit);

  document.querySelectorAll('.auth-form input').forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        handleAuthSubmit();
      }
    });
  });

  document.querySelectorAll('.glass-btn, .auth-btn, .toggle-highlight').forEach(btn => {
    btn.addEventListener('touchstart', () => {}, { passive: true });
  });
</script>

</body>
        </html>
